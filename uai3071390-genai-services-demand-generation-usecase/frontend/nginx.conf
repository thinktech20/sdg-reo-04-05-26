# nginx.conf.template — processed by envsubst at container startup.
#
# Each deployment environment injects its own values via the container runtime
# (compose environment:, ECS task definition environment, etc.).
#
#   Variable                Local (Docker Compose)              AWS dev / QA / Prod
#   ──────────────────────     ────────────────────────────────    ──────────────────────────────────────
#   NGINX_PORT              3000                                80  (ALB→container port 80)
#   NGINX_RESOLVER          127.0.0.11  (Docker internal DNS)   169.254.169.253  (VPC DNS)
#   QNA_UPSTREAM            http://qna-agent:8087               http://questionansweragent.sdg.<env>:8087
#   DATA_SERVICE_UPSTREAM   http://data-service:8086            http://dataservices.sdg.<env>:8086
#
# Why explicit upstreams instead of a SERVICE_NAMESPACE suffix?
# The Docker Compose service names (qna-agent, data-service) differ from the
# AWS Cloud Map / ECS service-discovery DNS names (questionansweragent, dataservices).
# A suffix approach would produce http://qna-agent.sdg.dev:8087 which does not
# resolve.  Explicit per-service upstream vars cover both patterns with no
# template logic.
#
# NGINX_PORT also drives EXPOSE in the Dockerfile and the ALB target-group port.
# Keep those three in sync when changing it.

server {
    listen ${NGINX_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve upstreams at request time (TTL-aware). Critical in ECS Fargate
    # where task IPs change on every deployment or restart.
    resolver ${NGINX_RESOLVER} valid=10s ipv6=off;

    # SPA fallback — React Router handles client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ALB / ECS health check endpoints (access_log off to reduce noise).
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy"}';
    }

    location = /ui/health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy"}';
    }

    # QnA Agent — REST chat (complete responses per ADR-001).
    # Rewrites /questionansweragent/* to /questionansweragent/* before forwarding.
    location /questionansweragent/ {
        set $upstream ${QNA_UPSTREAM};
        rewrite ^/questionansweragent/(.*)$ /questionansweragent/$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Data service — frontend calls /api/* which is rewritten to the canonical
    # /dataservices/api/v1/* path before forwarding to the data-service container.
    # This keeps the browser-side URL short and decoupled from the internal path.
    location /api/ {
        set $upstream ${DATA_SERVICE_UPSTREAM};
        rewrite ^/api/(.*)$ /dataservices/api/v1/$1 break;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ALB-aligned data-service path — kept for direct AWS ALB routing and
    # backwards-compatible calls that already use the canonical prefix.
    location /dataservices/ {
        set $upstream ${DATA_SERVICE_UPSTREAM};
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}